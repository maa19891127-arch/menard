<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メナード注文管理</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #fdf6f9; color: #333; font-size: 14px; }

  /* ヘッダー */
  .header { background: linear-gradient(135deg, #c0607a, #e8a0b0); color: white; padding: 12px 16px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 18px; font-weight: bold; }
  .header .logo { font-size: 24px; }

  /* メインレイアウト */
  .container { display: flex; height: calc(100vh - 52px); }

  /* 左側: 商品リスト */
  .product-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 2px solid #e8c0cc; }

  /* フィルターエリア */
  .filter-area { background: #fff; border-bottom: 1px solid #e8c0cc; }
  .filter-row { padding: 6px 10px 4px; }
  .filter-label { font-size: 10px; color: #999; font-weight: bold; margin-bottom: 3px; letter-spacing: 0.5px; }
  .tab-row { display: flex; flex-wrap: wrap; gap: 4px; padding-bottom: 6px; }

  /* カテゴリタブ（ピンク） */
  .category-tabs { display: flex; flex-wrap: wrap; gap: 4px; }
  .cat-btn { padding: 4px 10px; border: 1.5px solid #c0607a; border-radius: 20px; background: white; color: #c0607a; cursor: pointer; font-size: 12px; transition: all 0.2s; white-space: nowrap; }
  .cat-btn.active, .cat-btn:hover { background: #c0607a; color: white; }

  /* ブランドタブ（ゴールド） */
  .brand-tabs { display: flex; flex-wrap: wrap; gap: 4px; }
  .brand-btn { padding: 4px 9px; border: 1.5px solid #9a7040; border-radius: 20px; background: white; color: #9a7040; cursor: pointer; font-size: 11px; transition: all 0.2s; white-space: nowrap; }
  .brand-btn.active, .brand-btn:hover { background: #9a7040; color: white; }

  /* 検索 */
  .search-box { padding: 10px; background: #fff; border-bottom: 1px solid #e8c0cc; }
  .search-box input { width: 100%; padding: 8px 12px; border: 1.5px solid #ddb0c0; border-radius: 20px; font-size: 14px; outline: none; }
  .search-box input:focus { border-color: #c0607a; }

  /* 商品一覧 */
  .product-list { flex: 1; overflow-y: auto; padding: 8px; }
  .product-item { display: flex; align-items: center; padding: 8px 10px; margin-bottom: 4px; background: white; border-radius: 8px; border: 1px solid #f0d0da; cursor: pointer; transition: all 0.15s; gap: 8px; }
  .product-item:hover { border-color: #c0607a; background: #fff5f8; transform: translateX(2px); }
  .product-item .cat-badge { font-size: 10px; background: #f0d0da; color: #c0607a; padding: 2px 6px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .product-item .prod-info { flex: 1; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .product-item .prod-brand { display: block; font-size: 11px; font-weight: bold; color: #c0607a; writing-mode: horizontal-tb; }
  .product-item .prod-name { display: block; font-size: 12px; line-height: 1.4; writing-mode: horizontal-tb; color: #333; }
  .product-item .prod-price { font-size: 13px; font-weight: bold; color: #c0607a; white-space: nowrap; flex-shrink: 0; }
  .product-item .prod-vol { font-size: 10px; color: #aaa; writing-mode: horizontal-tb; }
  .product-item .add-btn { background: #c0607a; color: white; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 18px; cursor: pointer; line-height: 1; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .product-item .add-btn:hover { background: #a0485e; }

  /* 右側: 注文パネル */
  .order-panel { width: 360px; display: flex; flex-direction: column; background: white; }

  /* 顧客情報 */
  .customer-info { padding: 12px; background: #fff5f8; border-bottom: 2px solid #e8c0cc; }
  .customer-info h2 { font-size: 15px; color: #c0607a; margin-bottom: 8px; }
  .customer-info input, .customer-info select { width: 100%; padding: 7px 10px; border: 1.5px solid #ddb0c0; border-radius: 6px; font-size: 13px; margin-bottom: 6px; outline: none; }
  .customer-info input:focus { border-color: #c0607a; }
  .delivery-btns { display: flex; flex-direction: column; gap: 5px; margin-bottom: 6px; }
  .delivery-btn { padding: 8px 10px; border: 1.5px solid #ddb0c0; border-radius: 6px; background: white; color: #666; cursor: pointer; font-size: 12px; text-align: left; transition: all 0.15s; }
  .delivery-btn.selected { background: #c0607a; color: white; border-color: #c0607a; font-weight: bold; }
  .row2 { display: flex; gap: 6px; }
  .row2 input { margin-bottom: 0; }

  /* 注文リスト */
  .order-list-wrap { flex: 1; overflow-y: auto; padding: 8px; }
  .order-list-wrap h3 { font-size: 13px; color: #888; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #eee; }
  .order-empty { text-align: center; color: #ccc; padding: 30px; font-size: 13px; }
  .order-item { display: flex; align-items: center; gap: 6px; padding: 7px 8px; background: #fff5f8; border-radius: 6px; margin-bottom: 4px; border: 1px solid #f0d0da; }
  .order-item .o-name { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .order-item .o-brand { display: block; font-size: 11px; font-weight: bold; color: #c0607a; }
  .order-item .o-product { display: block; font-size: 12px; line-height: 1.3; color: #333; }
  .order-item .qty-ctrl { display: flex; align-items: center; gap: 3px; }
  .qty-btn { background: #e8c0cc; border: none; border-radius: 4px; width: 22px; height: 22px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .qty-btn:hover { background: #c0607a; color: white; }
  .qty-num { font-size: 13px; font-weight: bold; min-width: 20px; text-align: center; }
  .o-subtotal { font-size: 12px; font-weight: bold; color: #c0607a; min-width: 70px; text-align: right; }
  .del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 0 2px; }
  .del-btn:hover { color: #e00; }

  /* 合計 */
  .total-section { padding: 12px; border-top: 2px solid #e8c0cc; background: #fff5f8; }
  .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 13px; }
  .total-row.grand { font-size: 16px; font-weight: bold; color: #c0607a; margin-top: 6px; padding-top: 6px; border-top: 1px solid #e8c0cc; }

  /* ボタン */
  .action-buttons { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
  .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; }
  .btn-print { background: linear-gradient(135deg, #c0607a, #e8a0b0); color: white; }
  .btn-print:hover { background: linear-gradient(135deg, #a0485e, #c0607a); }
  .btn-save { background: #4a9060; color: white; }
  .btn-save:hover { background: #3a7050; }
  .btn-line { background: linear-gradient(135deg, #06c755, #00a040); color: white; }
  .btn-line:hover { background: linear-gradient(135deg, #00a040, #008030); }
  .btn-clear { background: #f0f0f0; color: #888; }
  .btn-clear:hover { background: #e0e0e0; color: #555; }

  /* 履歴ボタン */
  .history-btn { position: fixed; bottom: 20px; left: 20px; background: #7878c0; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 22px; cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.2); }

  /* LINEモーダル */
  .line-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; align-items: flex-end; justify-content: center; }
  .line-modal.show { display: flex; }
  .line-modal-box { background: white; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 600px; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .line-modal-title { font-size: 16px; font-weight: bold; color: #c0607a; text-align: center; margin-bottom: 12px; }
  .line-modal-text { background: #f5f5f5; border-radius: 10px; padding: 14px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; margin-bottom: 14px; max-height: 40vh; overflow-y: auto; }
  .line-modal-hint { font-size: 12px; color: #888; text-align: center; margin-bottom: 14px; }
  .line-modal-btns { display: flex; flex-direction: column; gap: 8px; }
  .btn-copy-send { background: linear-gradient(135deg, #06c755, #00a040); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; }
  .btn-close-modal { background: #f0f0f0; color: #666; border: none; border-radius: 10px; padding: 12px; font-size: 14px; cursor: pointer; }

  /* モーダル */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
  .modal.show { display: flex; }
  .modal-box { background: white; border-radius: 12px; padding: 20px; width: 90%; max-width: 600px; max-height: 80vh; display: flex; flex-direction: column; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-header h2 { font-size: 16px; color: #c0607a; }
  .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #888; }
  .modal-body { flex: 1; overflow-y: auto; }
  .history-entry { background: #fff5f8; border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #f0d0da; cursor: pointer; }
  .history-entry:hover { border-color: #c0607a; }
  .history-entry .h-meta { font-size: 12px; color: #888; margin-bottom: 4px; }
  .history-entry .h-customer { font-size: 14px; font-weight: bold; color: #333; }
  .history-entry .h-total { font-size: 13px; color: #c0607a; font-weight: bold; }
  .history-entry .h-items { font-size: 11px; color: #666; margin-top: 4px; }
  .no-history { text-align: center; color: #ccc; padding: 30px; }

  /* 印刷用 */
  @media print {
    body { background: white; font-size: 12px; }
    .header, .product-panel, .action-buttons, .history-btn, .modal { display: none !important; }
    .container { display: block; height: auto; }
    .order-panel { width: 100%; border: none; }
    .customer-info input, .customer-info select { border: none; font-weight: bold; }
    .order-item { break-inside: avoid; }
    .print-title { display: block !important; font-size: 20px; text-align: center; color: #c0607a; font-weight: bold; margin-bottom: 16px; }
    .btn-print, .btn-save, .btn-clear { display: none; }
  }
  .print-title { display: none; }

  /* モバイルタブ */
  .mobile-tabs { display: none; }
  @media (max-width: 700px) {
    .mobile-tabs {
      display: flex; position: sticky; top: 52px; z-index: 99;
      background: white; border-bottom: 2px solid #e8c0cc;
    }
    .m-tab {
      flex: 1; padding: 12px 6px; border: none; background: white;
      color: #999; font-size: 14px; font-weight: bold; cursor: pointer;
      border-bottom: 3px solid transparent; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .m-tab.active { color: #c0607a; border-bottom-color: #c0607a; background: #fff5f8; }
    .cart-badge {
      background: #c0607a; color: white; border-radius: 50%;
      width: 20px; height: 20px; font-size: 11px; display: inline-flex;
      align-items: center; justify-content: center; font-weight: bold;
    }
    .container { flex-direction: column; height: calc(100vh - 100px); }
    .order-panel { width: 100%; border-top: 2px solid #e8c0cc; flex: 1; overflow-y: auto; }
    .product-list { max-height: calc(100vh - 280px); }
    .panel-hidden { display: none !important; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="logo">🌸</span>
  <h1>メナード 注文管理</h1>
</div>

<!-- モバイル用タブ -->
<div class="mobile-tabs" id="mobileTabs">
  <button class="m-tab active" id="tabProducts" onclick="switchTab('products')">🛍 商品を選ぶ</button>
  <button class="m-tab" id="tabCart" onclick="switchTab('cart')">
    🛒 カートを見る <span class="cart-badge" id="cartBadge" style="display:none">0</span>
  </button>
</div>

<div class="container">
  <!-- 左: 商品パネル -->
  <div class="product-panel" id="productPanel">
    <div class="filter-area">
      <div class="filter-row">
        <div class="filter-label">📂 カテゴリ</div>
        <div class="tab-row"><div class="category-tabs" id="catTabs"></div></div>
      </div>
      <div class="filter-row">
        <div class="filter-label">🏷️ ブランド</div>
        <div class="tab-row"><div class="brand-tabs" id="brandTabs"></div></div>
      </div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 商品名で検索...">
    </div>
    <div class="product-list" id="productList"></div>
  </div>

  <!-- 右: 注文パネル -->
  <div class="order-panel" id="orderPanel">
    <div class="customer-info">
      <h2>📋 注文情報</h2>
      <input type="text" id="customerName" placeholder="お客様名" />
      <div class="delivery-btns" id="deliveryBtns">
        <button class="delivery-btn selected" onclick="selectDelivery(this,'配送希望')">📦 配送希望</button>
        <button class="delivery-btn" onclick="selectDelivery(this,'自宅まで対面配送希望')">🚗 自宅まで対面配送希望</button>
        <button class="delivery-btn" onclick="selectDelivery(this,'愛知県弥富市での受取り希望')">🏪 愛知県弥富市での受取り希望</button>
      </div>
      <input type="hidden" id="deliveryType" value="配送希望">
      <div class="row2">
        <input type="date" id="orderDate" />
        <input type="text" id="orderNote" placeholder="メモ" />
      </div>
    </div>

    <div class="order-list-wrap">
      <h3>注文商品</h3>
      <div id="orderItems"><div class="order-empty">← 左の商品を選んでください</div></div>
    </div>

    <div class="total-section">
      <div class="total-row"><span>小計（税抜）</span><span id="subtotalEx">0円</span></div>
      <div class="total-row"><span>小計（税込）</span><span id="subtotalTax">0円</span></div>
      <div class="total-row grand"><span>合計（税込）</span><span id="grandTotal">0円</span></div>
    </div>

    <div class="action-buttons">
      <div class="print-title">メナード注文書</div>
      <button class="btn btn-line" onclick="sendToLINE()">💬 LINEで注文を送る</button>
      <button class="btn btn-clear" onclick="clearOrder()">🗑️ クリア</button>
    </div>
  </div>
</div>

<button class="history-btn" onclick="showHistory()" title="注文履歴">📋</button>

<!-- LINE送信モーダル -->
<div class="line-modal" id="lineModal">
  <div class="line-modal-box">
    <div class="line-modal-title">🌸 注文内容の確認</div>
    <div class="line-modal-text" id="lineModalText"></div>
    <div class="line-modal-hint">📋 コピーしてLINEチャットに貼り付けて送信してください</div>
    <div class="line-modal-btns">
      <button class="btn-copy-send" onclick="copyAndOpenLine()">📋 コピーしてLINEを開く</button>
      <button class="btn-close-modal" onclick="closeLineModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- 履歴モーダル -->
<div class="modal" id="historyModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>📋 注文履歴</h2>
      <button class="modal-close" onclick="closeHistory()">×</button>
    </div>
    <div class="modal-body" id="historyBody"></div>
  </div>
</div>

let currentCat = 'すべて';
let currentBrand = 'すべて';
let searchText = '';
let orderItems = []; // [{product, qty}]

// カテゴリ一覧
const cats = ['すべて', 'スキンケア', 'メイクアップ', 'ボディケア', 'ヘアケア', 'メンズ', '化粧用具', '健康食品', 'フレグランス', 'ネイル'];

// ブランド一覧
const BRAND_LIST = ['すべて', 'オーセント', 'エンベリエ', 'イルネージュ', 'リシアル', 'TK', 'フェアルーセント', 'ラインズリセット', 'コラックス', 'ビューネ', 'ハーブマスク', 'ジュピエル', 'クロワ'];

// ブランド名と商品名を分割
const BRAND_NAMES = ['オーセント', 'エンベリエ', 'イルネージュ', 'リシアル', 'TK', 'フェアルーセント', '薬用ラインズリセット', 'ラインズリセット', '薬用ビューネ', 'ビューネ', 'コラックス', 'ハーブマスク', 'ジュピエル', 'クロワ'];
function splitName(fullName) {
  for (const brand of BRAND_NAMES) {
    if (fullName.startsWith(brand)) {
      const rest = fullName.slice(brand.length).trim();
      return { brand, product: rest || brand };
    }
  }
  // ブランドが特定できない場合は最初のスペースで分割
  const sp = fullName.indexOf(' ');
  if (sp > 0) return { brand: fullName.slice(0, sp), product: fullName.slice(sp + 1) };
  return { brand: '', product: fullName };
}

// 初期化
function init() {
  // 今日の日付セット
  document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];

  // カテゴリタブ
  const tabsEl = document.getElementById('catTabs');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === 'すべて' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => selectCat(cat);
    tabsEl.appendChild(btn);
  });

  // ブランドタブ
  const brandTabsEl = document.getElementById('brandTabs');
  BRAND_LIST.forEach(brand => {
    const btn = document.createElement('button');
    btn.className = 'brand-btn' + (brand === 'すべて' ? ' active' : '');
    btn.textContent = brand;
    btn.onclick = () => selectBrand(brand);
    brandTabsEl.appendChild(btn);
  });

  // 検索
  document.getElementById('searchInput').addEventListener('input', e => {
    searchText = e.target.value;
    renderProducts();
  });

  renderProducts();
}

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
  renderProducts();
}

function selectBrand(brand) {
  currentBrand = brand;
  document.querySelectorAll('.brand-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === brand);
  });
  renderProducts();
}

function renderProducts() {
  const list = document.getElementById('productList');
  const filtered = PRODUCTS.filter(p => {
    const catOk = currentCat === 'すべて' || p.cat === currentCat;
    const brandOk = currentBrand === 'すべて' || p.name.includes(currentBrand);
    const searchOk = !searchText || p.name.toLowerCase().includes(searchText.toLowerCase());
    return catOk && brandOk && searchOk;
  });

  list.innerHTML = filtered.map((p, i) => {
    const idx = PRODUCTS.indexOf(p);
    const displayPrice = p.priceTax || p.priceEx || '価格不明';
    const volText = p.vol ? `<span class="prod-vol">${p.vol}</span>` : '';
    const { brand, product } = splitName(p.name);
    const brandHtml = brand ? `<span class="prod-brand">${brand}</span>` : '';
    return `<div class="product-item" onclick="addProduct(${idx})">
      <span class="cat-badge">${p.cat}</span>
      <div class="prod-info">
        ${brandHtml}
        <span class="prod-name">${product}</span>
        ${volText}
      </div>
      <span class="prod-price">${displayPrice}</span>
      <button class="add-btn" onclick="event.stopPropagation();addProduct(${idx})">+</button>
    </div>`;
  }).join('');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="order-empty">商品が見つかりません</div>';
  }
}

function addProduct(idx) {
  const p = PRODUCTS[idx];
  const existing = orderItems.find(o => o.product === p);
  if (existing) {
    existing.qty++;
  } else {
    orderItems.push({ product: p, qty: 1 });
  }
  renderOrder();
  updateCartBadge();
  // モバイル：カートに1個目が追加されたらカートタブをピカッと示す
  if (window.innerWidth <= 700 && orderItems.length === 1) {
    const tc = document.getElementById('tabCart');
    if (tc) { tc.style.animation = 'none'; tc.style.background = '#fff0f5'; setTimeout(()=>tc.style.background='', 600); }
  }
}

function changeQty(i, delta) {
  orderItems[i].qty += delta;
  if (orderItems[i].qty <= 0) {
    orderItems.splice(i, 1);
  }
  renderOrder();
  updateCartBadge();
}

function removeItem(i) {
  orderItems.splice(i, 1);
  renderOrder();
}

function parsePrice(str) {
  if (!str) return 0;
  const m = str.match(/[\d,]+/);
  return m ? parseInt(m[0].replace(/,/g, '')) : 0;
}

function formatNum(n) {
  return n.toLocaleString('ja-JP') + '円';
}

function renderOrder() {
  const el = document.getElementById('orderItems');
  if (orderItems.length === 0) {
    el.innerHTML = '<div class="order-empty">← 左の商品を選んでください</div>';
    document.getElementById('subtotalEx').textContent = '0円';
    document.getElementById('subtotalTax').textContent = '0円';
    document.getElementById('grandTotal').textContent = '0円';
    return;
  }

  let totalEx = 0, totalTax = 0;

  el.innerHTML = orderItems.map((o, i) => {
    const exPrice = parsePrice(o.product.priceEx);
    const taxPrice = parsePrice(o.product.priceTax) || exPrice;
    const subtax = taxPrice * o.qty;
    totalEx += exPrice * o.qty;
    totalTax += taxPrice * o.qty;
    const { brand: ob, product: op } = splitName(o.product.name);
    return `<div class="order-item">
      <div class="o-name">
        ${ob ? `<span class="o-brand">${ob}</span>` : ''}
        <span class="o-product">${op}</span>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
        <span class="qty-num">${o.qty}</span>
        <button class="qty-btn" onclick="changeQty(${i},1)">＋</button>
      </div>
      <span class="o-subtotal">${formatNum(subtax)}</span>
      <button class="del-btn" onclick="removeItem(${i})">×</button>
    </div>`;
  }).join('');

  document.getElementById('subtotalEx').textContent = formatNum(totalEx);
  document.getElementById('subtotalTax').textContent = formatNum(totalTax);
  document.getElementById('grandTotal').textContent = formatNum(totalTax);
}

// モバイルタブ切り替え
function switchTab(tab) {
  const isMobile = window.innerWidth <= 700;
  if (!isMobile) return;
  const pp = document.getElementById('productPanel');
  const op = document.getElementById('orderPanel');
  const tp = document.getElementById('tabProducts');
  const tc = document.getElementById('tabCart');
  if (tab === 'products') {
    pp.classList.remove('panel-hidden');
    op.classList.add('panel-hidden');
    tp.classList.add('active');
    tc.classList.remove('active');
  } else {
    pp.classList.add('panel-hidden');
    op.classList.remove('panel-hidden');
    tp.classList.remove('active');
    tc.classList.add('active');
  }
}

// カートバッジ更新
function updateCartBadge() {
  const count = orderItems.reduce((s, o) => s + o.qty, 0);
  const badge = document.getElementById('cartBadge');
  if (!badge) return;
  badge.textContent = count;
  badge.style.display = count > 0 ? 'inline-flex' : 'none';
}

function selectDelivery(btn, value) {
  document.querySelectorAll('.delivery-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('deliveryType').value = value;
}

function clearOrder() {
  if (orderItems.length === 0) return;
  if (confirm('注文をクリアしますか？')) {
    orderItems = [];
    document.getElementById('customerName').value = '';
    document.getElementById('orderNote').value = '';
    document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('deliveryType').value = '配送希望';
    document.querySelectorAll('.delivery-btn').forEach((b,i) => b.classList.toggle('selected', i===0));
    renderOrder();
  }
}

function saveOrder() {
  if (orderItems.length === 0) { alert('注文商品がありません'); return; }
  const name = document.getElementById('customerName').value || '（名前未入力）';
  const date = document.getElementById('orderDate').value;
  const note = document.getElementById('orderNote').value;

  let totalTax = 0;
  const items = orderItems.map(o => {
    const tax = parsePrice(o.product.priceTax) || parsePrice(o.product.priceEx);
    totalTax += tax * o.qty;
    return { name: o.product.name, priceEx: o.product.priceEx, priceTax: o.product.priceTax, qty: o.qty };
  });

  const order = { id: Date.now(), date, customer: name, note, items, totalTax };
  const history = JSON.parse(localStorage.getItem('menardOrders') || '[]');
  history.unshift(order);
  localStorage.setItem('menardOrders', JSON.stringify(history));
  alert(`「${name}」様の注文を保存しました！`);
}

function printOrder() {
  if (orderItems.length === 0) { alert('注文商品がありません'); return; }
  window.print();
}

// LIFF初期化
const LIFF_ID = '2009711109-L6TqteMX';
let liffReady = false;
liff.init({ liffId: LIFF_ID })
  .then(() => { liffReady = true; })
  .catch(err => { console.warn('LIFF init error:', err); });

function buildOrderText() {
  const name = document.getElementById('customerName').value || '（名前未入力）';
  const date = document.getElementById('orderDate').value;
  const note = document.getElementById('orderNote').value;
  const delivery = document.getElementById('deliveryType').value;
  let totalTax = 0;
  const lines = orderItems.map(o => {
    const tax = parsePrice(o.product.priceTax) || parsePrice(o.product.priceEx);
    totalTax += tax * o.qty;
    return `・${o.product.name}　×${o.qty}　${tax * o.qty >= 0 ? (tax * o.qty).toLocaleString() + '円' : ''}`;
  });
  const text = [
    '🌸 メナード注文',
    '━━━━━━━━━━',
    `👤 お名前：${name}`,
    `📅 日付：${date}`,
    `🚚 お届け：${delivery}`,
    note ? `📝 メモ：${note}` : '',
    '━━━━━━━━━━',
    ...lines,
    '━━━━━━━━━━',
    `💴 合計（税込）：${totalTax.toLocaleString()}円`,
  ].filter(Boolean).join('\n');
  return { text, totalTax };
}

let _currentOrderText = '';

function sendToLINE() {
  if (orderItems.length === 0) { alert('注文商品がありません'); return; }
  const { text } = buildOrderText();
  _currentOrderText = text;

  if (liffReady && liff.isInClient()) {
    // LIFF内（リッチメニューから）→ モーダルで表示してコピー誘導
    document.getElementById('lineModalText').textContent = text;
    document.getElementById('lineModal').classList.add('show');
  } else {
    // ブラウザから → クリップボード＋LINEアプリ起動
    navigator.clipboard.writeText(text).then(() => {
      const encoded = encodeURIComponent(text);
      window.open(`https://line.me/R/oaMessage/@761sosfz/?text=${encoded}`, '_blank');
    }).catch(() => {
      alert('注文内容をコピーしてLINEで送ってください：\n\n' + text);
    });
  }
}

function copyAndOpenLine() {
  navigator.clipboard.writeText(_currentOrderText).then(() => {
    const encoded = encodeURIComponent(_currentOrderText);
    // LIFF内ではopenWindowでLINEチャットを開く
    if (liffReady && liff.isInClient()) {
      liff.openWindow({
        url: `https://line.me/R/oaMessage/@761sosfz/?text=${encoded}`,
        external: false
      });
    } else {
      window.open(`https://line.me/R/oaMessage/@761sosfz/?text=${encoded}`, '_blank');
    }
    closeLineModal();
  }).catch(() => {
    // クリップボード失敗時はテキスト選択状態にする
    const el = document.getElementById('lineModalText');
    const range = document.createRange();
    range.selectNodeContents(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    alert('テキストを長押しでコピーして、LINEチャットに貼り付けてください');
  });
}

function closeLineModal() {
  document.getElementById('lineModal').classList.remove('show');
}

function showHistory() {
  const modal = document.getElementById('historyModal');
  const body = document.getElementById('historyBody');
  const history = JSON.parse(localStorage.getItem('menardOrders') || '[]');

  if (history.length === 0) {
    body.innerHTML = '<div class="no-history">保存された注文はありません</div>';
  } else {
    body.innerHTML = history.map((o, i) => {
      const itemSummary = o.items.slice(0,3).map(it => `${it.name}×${it.qty}`).join('、');
      const more = o.items.length > 3 ? `他${o.items.length-3}点` : '';
      return `<div class="history-entry" onclick="loadOrder(${i})">
        <div class="h-meta">${o.date} ${o.note ? '📝'+o.note : ''}</div>
        <div class="h-customer">👤 ${o.customer}</div>
        <div class="h-total">合計 ${o.totalTax.toLocaleString()}円（税込）</div>
        <div class="h-items">${itemSummary}${more ? '、'+more : ''}</div>
      </div>`;
    }).join('');
  }

  modal.classList.add('show');
}

function loadOrder(i) {
  const history = JSON.parse(localStorage.getItem('menardOrders') || '[]');
  const o = history[i];
  if (!confirm(`「${o.customer}」様の注文を読み込みますか？
（現在の注文はクリアされます）`)) return;

  orderItems = o.items.map(it => {
    const product = PRODUCTS.find(p => p.name === it.name) || { ...it, cat: '' };
    return { product, qty: it.qty };
  });
  document.getElementById('customerName').value = o.customer;
  document.getElementById('orderDate').value = o.date;
  document.getElementById('orderNote').value = o.note || '';
  renderOrder();
  closeHistory();
}

function closeHistory() {
  document.getElementById('historyModal').classList.remove('show');
}

// モーダル外クリックで閉じる
document.getElementById('historyModal').addEventListener('click', function(e) {
  if (e.target === this) closeHistory();
});

init();
</script>
</body>
</html>
